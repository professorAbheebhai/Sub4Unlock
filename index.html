    <style>

        /* ============ CSS VARIABLES ============ */
        :root {
            --bg: #FAFBFF;
            --soft-bg: #F0F2FA;
            --field-bg: #F4F5FA;
            --card-border: #E8E9F2;
            --card-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
            --card-shadow-hover: 0 8px 32px rgba(16, 24, 40, 0.08);

            --blue-glow: rgba(47, 95, 237, 0.35);
            --amber: #F5A623;
            --amber-glow: rgba(245, 166, 35, 0.35);
            --mint: #22C55E;
            --mint-glow: rgba(34, 197, 94, 0.35);
            --violet: #8B5CF6;
            --violet-glow: rgba(139, 92, 246, 0.4);
            --card-radius: 22px;
            --transition-fast: 0.18s cubic-bezier(0.22, 0.9, 0.3, 1);
            --transition-smooth: 0.35s cubic-bezier(0.22, 0.9, 0.3, 1);
        }
        body.dark {
            --bg: #0D0B1A;
            --soft-bg: #13102A;
            --field-bg: #1A1638;
            --card-border: #282448;
            --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.35);
            --ink: #F0EDFA;
            --muted: #9C93B8;
        }

        /* Gate always uses its own dark palette */
        .gate {
            --g-bg1: #1C1730;
            --g-bg2: #100C1E;
            --g-field: #241D3D;
            --g-line: rgba(255, 255, 255, 0.08);
            --g-text: #F4F1FB;
            --g-muted: #9C93B8;
            --g-card: rgba(28, 23, 48, 0.8);
        }

        /* ============ RESET & BASE ============ */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink);
            transition: background var(--transition-smooth), color var(--transition-smooth);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }
        .display {
            font-family: 'Space Grotesk', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ============ ANIMATED BACKGROUND ORBS ============ */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
            animation: orbFloat 18s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) {
            width: 420px;
            height: 420px;
            background: var(--blue-glow);
            top: -10%;
            left: -8%;
            animation-delay: 0s;
            animation-duration: 20s;
        }
        .bg-orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--violet-glow);
            bottom: -12%;
            right: -6%;
            animation-delay: -7s;
            animation-duration: 22s;
        }
        .bg-orb:nth-child(3) {
            width: 280px;
            height: 280px;
            background: var(--amber-glow);
            top: 50%;
            left: 55%;
            animation-delay: -14s;
            animation-duration: 19s;
        }
        .bg-orb:nth-child(4) {
            width: 200px;
            height: 200px;
            background: var(--mint-glow);
            top: 30%;
            left: -5%;
            animation-delay: -3s;
            animation-duration: 24s;
        }
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(60px, -40px) scale(1.08);
            }
            50% {
                transform: translate(-30px, 50px) scale(0.94);
            }
            75% {
                transform: translate(-50px, -30px) scale(1.05);
            }
        }

        /* ============ APP WRAPPER ============ */
        #app {
            position: relative;
            z-index: 1;
        }

        /* ============ HEADER ============ */
        header {
            padding: 28px 20px 18px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            position: relative;
            z-index: 2;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: color-mix(in srgb, var(--blue) 12%, transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--blue-glow);
            animation: iconPulse 3s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,
            100% {
                box-shadow: 0 0 20px var(--blue-glow);
            }
            50% {
                box-shadow: 0 0 35px var(--blue-glow), 0 0 60px rgba(47, 95, 237, 0.2);
            }
        }
        .brand-title {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .brand-title span {
            color: var(--blue);
        }
        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-top: 8px;
            max-width: 520px;
            line-height: 1.5;
        }
        .theme-btn {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            background: var(--field-bg);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }
        .theme-btn:hover {
            border-color: var(--blue);
            box-shadow: 0 0 18px var(--blue-glow);
        }
        .theme-btn:active {
            transform: scale(0.94);
        }

        /* ============ MAIN LAYOUT ============ */
        main {
            padding: 0 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }
        @media(min-width:1024px) {
            main {
                flex-direction: row;
                max-width: 1100px;
                margin: 0 auto;
            }
        }
        .col-form {
            flex: 1;
            min-width: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .col-preview {
            width: 100%;
        }
        @media(min-width:1024px) {
            .col-preview {
                width: 400px;
                position: sticky;
                top: 24px;
            }
        }

        /* ============ CARD ============ */
        .card {
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            padding: 20px 22px;
            box-shadow: var(--card-shadow);
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            box-shadow: var(--card-shadow-hover);
            border-color: color-mix(in srgb, var(--blue) 20%, var(--card-border));
        }
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-smooth);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
        .card:hover::after {
            opacity: 1;
        }

        /* ============ LABEL ============ */
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 12px;
            display: block;
        }

        /* ============ FIELD ============ */
        .field {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--field-bg);
            border-radius: 15px;
            padding: 14px 16px;
            transition: all var(--transition-fast);
            border: 1.5px solid transparent;
        }
        .field:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(47, 95, 237, 0.08);
        }
        .field svg {
            flex-shrink: 0;
            color: var(--muted);
        }
        .field .divider {
            width: 1px;
            height: 18px;
            background: var(--card-border);
            flex-shrink: 0;
        }
        .field input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--ink);
            font-family: inherit;
        }
        .field input::placeholder {
            color: var(--muted);
        }

        /* ============ CHIP GRID ============ */
        .chip-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media(min-width:480px) {
            .chip-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
        .chip {

            justify-content: space-between;

            border-radius: 15px;

            color: #fff;

            transition: all var(--transition-fast);
            font-family: inherit;
            position: relative;
            overflow: hidden;
            letter-spacing: -0.2px;
        }
        .chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            filter: brightness(1.08);
        }
        .chip:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .chip .left {
            display: flex;
            align-items: center;
            gap: 7px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chip .plus {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-fast);
        }
        .chip:hover .plus {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ============ ACTION ROW ============ */
        .action-row {
            display: flex;
            align-items: center;

            animation: slideIn 0.35s cubic-bezier(0.22, 0.9, 0.3, 1);

        .action-row:focus-within {

        .action-row input {

            min-width: 0;

            background: transparent;
            font-size: 14px;

        .action-row input::placeholder {

        .action-row button {

        /* ============ BUTTONS ============ */
        .btn-primary {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            background: var(--blue);
            display: flex;
            align-items: center;

            font-family: inherit;

            overflow: hidden;

        .btn-primary:hover {

        }
        .btn-primary:active {

        .btn-primary:disabled {

            box-shadow: none;

        }
        .btn-secondary {

            border: 1.5px solid var(--card-border);
            border-radius: 15px;
            padding: 11px;
            font-weight: 600;
            font-size: 14px;
            background: var(--field-bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
        }
        .btn-secondary:hover {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(47, 95, 237, 0.06);
        }
        .btn-blue-soft {
            flex: 1;
            border: none;
            border-radius: 15px;
            padding: 11px;
            font-weight: 600;
            font-size: 14px;
            background: var(--blue);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 14px var(--blue-glow);
        }
        .btn-blue-soft:hover {
            box-shadow: 0 8px 24px var(--blue-glow);
            transform: translateY(-1px);
        }

        /* ============ HINT & ERROR ============ */
        .hint {
            font-size: 13px;
            color: var(--muted);

        .error-text {

        @keyframes shake {
            0%,

                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {

            80% {

        /* ============ GENERATED LINK CARD ============ */
        .link-box {
            background: var(--field-bg);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 12px;
            word-break: break-all;
            color: var(--ink);
            margin-bottom: 14px;
            border: 1.5px solid var(--card-border);
            user-select: all;
            line-height: 1.6;
            transition: all var(--transition-fast);
        }
        .link-box:hover {
            border-color: var(--mint);
            box-shadow: 0 0 0 4px var(--mint-glow);
        }
        .code-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .code-row .ch {
            width: 42px;
            height: 50px;
            border-radius: 12px;
            background: var(--field-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            border: 1.5px solid var(--card-border);

        /* ============ GATE SCREEN (always dark) ============ */
        .gate {
            background: linear-gradient(175deg, var(--g-bg1) 0%, var(--g-bg2) 100%);
            border: 1px solid var(--g-line);
            border-radius: 26px;
            padding: 26px 22px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }
        .gate::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -30%;
            width: 160%;
            height: 160%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: gateGlow 8s ease-in-out infinite;
        }
        @keyframes gateGlow {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(20px, -15px) scale(1.15);
                opacity: 0.8;
            }
        }
        .gate>* {
            position: relative;
            z-index: 1;
        }
        .gate-head {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }
        .gate-icon {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            background: color-mix(in srgb, var(--violet) 13%, transparent);
            border: 1.5px solid color-mix(in srgb, var(--violet) 30%, transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            animation: gateIconFloat 3.5s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
        }
        @keyframes gateIconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-9px);
            }
        }
        .gate-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--g-text);
            letter-spacing: -0.3px;
        }
        .gate-sub {
            font-size: 13px;
            color: var(--g-muted);
            margin-top: 5px;
            line-height: 1.5;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .progress-track {
            flex: 1;
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--amber), #FBBF24, var(--mint));
            transition: width 0.5s cubic-bezier(0.22, 0.9, 0.3, 1);
            box-shadow: 0 0 12px var(--mint-glow);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }
        .progress-count {
            font-size: 12px;
            color: var(--g-muted);
            flex-shrink: 0;
            font-weight: 600;
        }

        /* ============ GATE ACTION BUTTONS ============ */
        .act-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--g-field);
            border: 1px solid var(--g-line);
            border-radius: 15px;
            padding: 12px 14px;
            margin-top: 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }
        .act-btn:first-of-type {
            margin-top: 0;
        }
        .act-btn:hover:not(.done) {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(2px);
        }
        .act-btn:active:not(.done) {
            transform: scale(0.98);
        }
        .act-btn.done {
            opacity: 0.85;
            border-color: rgba(34, 197, 94, 0.35);
            cursor: default;
            background: rgba(34, 197, 94, 0.04);
        }
        .act-ring {
            position: relative;
            width: 46px;
            height: 46px;
            flex-shrink: 0;
        }
        .act-ring svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }
        .act-ring .icon-slot {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        .act-text {
            flex: 1;
            min-width: 0;
        }
        .act-text .t1 {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--g-text);
            letter-spacing: -0.2px;
        }
        .act-text .t2 {
            display: block;
            font-size: 11px;
            color: var(--g-muted);
            margin-top: 2px;
            transition: color var(--transition-fast);
        }
        .lock-slot {
            flex-shrink: 0;
            transition: all var(--transition-fast);
        }

        /* ============ UNLOCK BUTTON ============ */
        .unlock-btn {
            width: 100%;
            margin-top: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 13px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.04);
            color: var(--g-muted);
            transition: all var(--transition-smooth);
            letter-spacing: -0.2px;
        }
        .unlock-btn.ready {
            background: linear-gradient(135deg, var(--violet), #6D3FE0);
            color: #fff;
            cursor: pointer;
            border-color: transparent;
            box-shadow: 0 6px 24px var(--violet-glow);
            animation: unlockPulse 2s ease-in-out infinite;
        }
        @keyframes unlockPulse {
            0%,
            100% {
                box-shadow: 0 6px 24px var(--violet-glow);
            }
            50% {
                box-shadow: 0 6px 40px var(--violet-glow), 0 0 60px rgba(139, 92, 246, 0.3);
            }

        .unlock-btn.ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px var(--violet-glow);
        }
        .unlock-btn.ready:active {
            transform: scale(0.96);
        }

        /* ============ REVEAL BOX ============ */
        .reveal-box {
            margin-top: 14px;
            border-radius: 16px;

            const count = 50;

              animation-duration:${Math.random()*0.8+0.9}s;

        // ==================== RIPPLE EFFECT ====================
        function addRipple(e, el) {
            const ripple = document.createElement("span");
            ripple.className = "ripple";
            const rect = el.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 1.5;
            ripple.style.width = ripple.style.height = size + "px";
            ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
            ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
            el.style.position = el.style.position || 'relative';
            el.style.overflow = 'hidden';
            el.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }

        // ==================== CONFIG ENCODING (UTF-8 safe) ====================
        function encodeConfig(cfg) {
            const json = JSON.stringify(cfg);
            const bytes = new TextEncoder().encode(json);
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function decodeConfig(str) {
            const binary = atob(str);
            const bytes = new Uint8Array([...binary].map(c => c.charCodeAt(0)));
            return JSON.parse(new TextDecoder().decode(bytes));
        }

            ta.style.top = "-9999px";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand("copy");
                showToast('✅ Link copied!',
                    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            } catch (e) {
                showToast('⚠️ Could not copy. Please select and copy manually.');
            }
            document.body.removeChild(ta);
        }

        // ==================== GATE (LOCK) SCREEN RENDERING ====================
        function renderGateInto(container, config, opts = {}) {
            container.innerHTML = "";
            const doneIds = new Set();
            let revealed = false;

            const gate = document.createElement("div");
            gate.className = "gate reveal-el in";
            container.appendChild(gate);

            // Header
            const head = document.createElement("div");
            head.className = "gate-head";
            head.innerHTML = `
            <div class="gate-icon">${iconLock("var(--amber)", 24)}</div>
            <div class="gate-title display">${config.title ? escapeHtml(config.title) : "Link is locked"}</div>
            <div class="gate-sub">Complete all actions below — each auto-verifies after ${WAIT_SECONDS}s</div>`;
            gate.appendChild(head);

            // Progress
            const progWrap = document.createElement("div");
            progWrap.className = "progress-wrap";
            const total = config.actions.length;
            progWrap.innerHTML = `
            <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
            <span class="progress-count mono">0/${total}</span>`;
            gate.appendChild(progWrap);
            const fillEl = progWrap.querySelector(".progress-fill");
            const countEl = progWrap.querySelector(".progress-count");

            // Action list
            const list = document.createElement("div");
            gate.appendChild(list);
            if (total === 0) {
                list.innerHTML =
                    `<p style="text-align:center;color:var(--g-muted);font-size:13px;padding:16px 0;">No actions configured yet.</p>`;
            }

            // Unlock button
            const unlockBtn = document.createElement("button");
            unlockBtn.className = "unlock-btn";
            unlockBtn.innerHTML = `${iconLock("var(--g-muted)", 16)} <span>Locked · finish actions above</span>`;
            unlockBtn.disabled = true;
            gate.appendChild(unlockBtn);

            // Reveal host
            const revealHost = document.createElement("div");
            gate.appendChild(revealHost);

            // Brand
            if (opts.brand !== false) {
                const brand = document.createElement("p");
                brand.className = "gate-brand";
                brand.innerHTML = `Secured by <b>Sub4Unlock 🔓</b>`;
                gate.appendChild(brand);
            }

            function updateProgress() {
                const done = doneIds.size;
                fillEl.style.width = (total ? (done / total * 100) : 0) + "%";
                countEl.textContent = done + "/" + total;
                const allDone = total > 0 && done >= total;
                unlockBtn.className = "unlock-btn" + (allDone ? " ready" : "");
                unlockBtn.innerHTML = allDone ?
                    `${iconShield("#fff", 16)} <span>Unlock link now</span>` :
                    `${iconLock("var(--g-muted)", 16)} <span>Locked · finish actions above</span>`;
                unlockBtn.disabled = !allDone;
            }

            unlockBtn.addEventListener("click", (e) => {
                if (unlockBtn.disabled || revealed) return;
                revealed = true;
                // Spawn confetti near the button
                const rect = unlockBtn.getBoundingClientRect();
                spawnConfetti(rect.left + rect.width / 2, rect.top);
                revealHost.innerHTML = `
              <div class="reveal-box">
                <div class="rb-label">🎉 Your link is ready!</div>
                <div class="rb-row">
                  <div class="rb-link mono">${escapeHtml(config.destination)}</div>
                  <button type="button" data-copy title="Copy link">${iconCopy("var(--g-text)", 14)}</button>
                  <a href="${escapeAttr(config.destination)}" target="_blank" rel="noopener noreferrer" title="Open link">${iconExternal("var(--g-text)", 14)}</a>
                </div>
              </div>`;
                const copyBtn = revealHost.querySelector("[data-copy]");
                if (copyBtn) {
                    copyBtn.addEventListener("click", (ev) => {
                        ev.stopPropagation();
                        addRipple(ev, copyBtn);
                        copyToClipboard(config.destination);
                    });
                }
                // Scroll reveal into view
                revealHost.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            // Build action buttons
            config.actions.forEach(a => {
                const p = platformFor(a.platformKey);
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "act-btn";
                const size = 44,
                    stroke = 3.5,
                    r = (size - stroke) / 2,
                    c = 2 * Math.PI * r;
                btn.innerHTML = `
              <span class="act-ring">
                <svg width="${size}" height="${size}">
                  <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="rgba(255,255,255,0.12)" stroke-width="${stroke}" fill="none"/>
                  <circle class="ring-progress" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${p.color}" stroke-width="${stroke}" fill="none"
                    stroke-dasharray="${c}" stroke-dashoffset="${c}" stroke-linecap="round" style="transition:stroke-dashoffset 0.15s linear"/>
                </svg>
                <span class="icon-slot">${p.icon("#fff", 18)}</span>
              </span>
              <span class="act-text">
                <span class="t1">${p.label}</span>
                <span class="t2">Tap to visit — verifies automatically</span>
              </span>
              <span class="lock-slot">${iconLock("var(--g-muted)", 15)}</span>`;
                list.appendChild(btn);

                const ring = btn.querySelector(".ring-progress");
                const iconSlot = btn.querySelector(".icon-slot");
                const t2 = btn.querySelector(".t2");
                const lockSlot = btn.querySelector(".lock-slot");
                let status = "idle",
                    timer = null;

                btn.addEventListener("click", (ev) => {
                    if (status !== "idle") return;
                    addRipple(ev, btn);
                    if (a.url) { try { window.open(a.url, "_blank", "noopener"); } catch (e) {} }
                    status = "running";
                    const start = Date.now();
                    timer = setInterval(() => {
                        const elapsed = (Date.now() - start) / 1000;
                        const rem = Math.max(0, WAIT_SECONDS - elapsed);
                        const pct = (WAIT_SECONDS - rem) / WAIT_SECONDS;
                        ring.style.strokeDashoffset = c * (1 - Math.min(1, Math.max(0,
                            pct)));
                        t2.textContent = "Verifying… " + Math.ceil(rem) + "s";
                        if (rem <= 0) {
                            clearInterval(timer);
                            status = "done";
                            btn.classList.add("done");
                            btn.disabled = true;
                            ring.setAttribute("stroke", "var(--mint)");
                            ring.style.strokeDashoffset = "0";
                            iconSlot.innerHTML = iconCheck("var(--mint)", 18);
                            t2.textContent = "✅ Verified";
                            lockSlot.innerHTML = "";
                            doneIds.add(a.id);
                            updateProgress();
                            if (doneIds.size >= total && total > 0 && !revealed) {
                                unlockBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    }, 100);
                });
            });

            updateProgress();
        }

        function escapeHtml(s) { const d = document.createElement("div");
            d.textContent = s; return d.innerHTML; }

        function escapeAttr(s) { return String(s).replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

        // ==================== BUILDER UI RENDERING ====================
        function render() {
            app.innerHTML = "";

            const wrap = document.createElement("div");
            wrap.style.minHeight = "100vh";

            // Header
            const header = document.createElement("header");
            header.innerHTML = `
            <div>
              <div class="brand">
                <div class="brand-icon">${iconKey("var(--blue)", 18)}</div>
                <span class="brand-title display">Sub4Unlock 🔓<span>Vault</span></span>
              </div>
              <p class="subtitle">Lock any link behind subscribe & follow actions — each auto-verifies after ${WAIT_SECONDS}s. No backend needed.</p>
            </div>
            <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode"></button>`;
            wrap.appendChild(header);
            header.querySelector("#themeToggle").innerHTML = theme === "light" ? iconMoon("var(--ink)", 18) : iconSun(
                "var(--ink)", 18);
            header.querySelector("#themeToggle").addEventListener("click", (e) => {
                addRipple(e, header.querySelector("#themeToggle"));
                theme = theme === "light" ? "dark" : "light";
                document.body.classList.toggle("dark", theme === "dark");
                render();
            });

            const main = document.createElement("main");
            wrap.appendChild(main);

            const colForm = document.createElement("section");
            colForm.className = "col-form";
            main.appendChild(colForm);

            if (generatedLink) {
                // --- Generated link card ---
                const card = document.createElement("div");
                card.className = "card reveal-el";
                const code = generatedLink.split("#g=")[1] || "";
                const shortDisplay = (code.slice(0, 6) + "…" + code.slice(-4)).toUpperCase();
                card.innerHTML = `
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                ${iconSparkles("var(--amber)", 20)}
                <h3 class="display" style="font-size:18px;font-weight:600;margin:0;letter-spacing:-0.3px;">Your gate is live!</h3>
              </div>
              <p class="hint" style="margin-top:0;margin-bottom:12px;">Copy this link & share it anywhere. The entire gate lives inside the link — no server required.</p>
              <div class="link-box mono" id="linkBox">${escapeHtml(generatedLink)}</div>
              <div class="code-row"><span class="ch mono">${shortDisplay.slice(0,3)}</span><span class="ch mono">${shortDisplay.slice(3,6)}</span><span class="ch mono">${shortDisplay.slice(7)}</span></div>
              <div style="display:flex;gap:8px;">
                <button class="btn-secondary" id="copyLinkBtn">${iconCopy("var(--ink)", 15)} Copy link</button>
                <button class="btn-blue-soft" id="openLinkBtn">${iconExternal("#fff", 15)} Open gate</button>
              </div>
              <button id="resetBtn" style="width:100%;margin-top:14px;background:none;border:none;color:var(--muted);font-size:13px;padding:8px;cursor:pointer;font-family:inherit;border-radius:10px;transition:all var(--transition-fast);">← Build another gate</button>`;
                colForm.appendChild(card);

                const linkBoxEl = card.querySelector("#linkBox");
                card.querySelector("#copyLinkBtn").addEventListener("click", (e) => {
                    addRipple(e, card.querySelector("#copyLinkBtn"));
                    copyToClipboard(generatedLink);
                    // Brief highlight animation
                    linkBoxEl.style.borderColor = "var(--mint)";
                    linkBoxEl.style.boxShadow = "0 0 0 6px var(--mint-glow)";
                    setTimeout(() => {
                        linkBoxEl.style.borderColor = "var(--card-border)";
                        linkBoxEl.style.boxShadow = "";
                    }, 800);
                });
                card.querySelector("#openLinkBtn").addEventListener("click", (e) => {
                    addRipple(e, card.querySelector("#openLinkBtn"));
                    location.hash = "g=" + code;
                    showGateFromHash();
                });
                card.querySelector("#resetBtn").addEventListener("click", resetBuilder);
            } else {
                // --- Builder form ---
                // Title card
                const titleCard = document.createElement("div");
                titleCard.className = "card reveal-el";
                titleCard.innerHTML =
                    `<div class="field">${iconType("var(--muted)", 18)}<span class="divider"></span><input id="titleInput" placeholder="Enter a title for your gate… (optional)" maxlength="80"/></div>`;
                colForm.appendChild(titleCard);
                const titleInput = titleCard.querySelector("#titleInput");
                titleInput.value = title;
                titleInput.addEventListener("input", (e) => { title = e.target.value;
                    updatePreviewTexts(); });

                // Actions card
                const actCard = document.createElement("div");
                actCard.className = "card reveal-el";
                actCard.innerHTML =
                    `<span class="label">📲 Social actions to complete</span><div class="chip-grid" id="chipGrid"></div><div id="selectedActions"></div>`;
                colForm.appendChild(actCard);
                const chipGrid = actCard.querySelector("#chipGrid");
                PLATFORMS.forEach(p => {
                    const active = !!actions.find(a => a.platformKey === p.key);
                    const chip = document.createElement("button");
                    chip.type = "button";
                    chip.className = "chip";
                    chip.style.background = p.color;
                    chip.style.transform = active ? "scale(0.97)" : "scale(1)";
                    chip.style.opacity = active ? "0.85" : "1";
                    chip.innerHTML =
                        `<span class="left">${p.icon("#fff", 15)}${p.label}</span><span class="plus">${active ? iconX("#fff", 12) : plusIcon()}</span>`;
                    chip.addEventListener("click", (e) => {
                        addRipple(e, chip);
                        toggleAction(p.key);
                    });
                    chipGrid.appendChild(chip);
                });
                renderSelectedActions(actCard.querySelector("#selectedActions"));

                // Destination card
                const destCard = document.createElement("div");
                destCard.className = "card reveal-el";
                destCard.innerHTML = `
              <span class="label">🔗 Link to lock</span>
              <div class="field">${iconLink("var(--amber)", 17)}<span class="divider"></span><input id="destInput" class="mono" placeholder="https://example.com/your-premium-content" maxlength="2000"/></div>
              <p class="hint">⏱ Each social action auto-verifies <b>${WAIT_SECONDS} seconds</b> after someone taps it.</p>`;
                colForm.appendChild(destCard);
                const destInput = destCard.querySelector("#destInput");
                destInput.value = destination;
                destInput.addEventListener("input", (e) => { destination = e.target.value; });

                // Error
                if (formError) {
                    const err = document.createElement("p");
                    err.className = "error-text";
                    err.textContent = formError;
                    colForm.appendChild(err);
                }

                // Generate button
                const genBtn = document.createElement("button");
                genBtn.className = "btn-primary reveal-el";
                genBtn.innerHTML = `${iconKey("#fff", 18)} Generate locked gate`;
                genBtn.addEventListener("click", (e) => {
                    addRipple(e, genBtn);
                    generate();
                });
                colForm.appendChild(genBtn);
            }

            // Live preview aside
            const aside = document.createElement("aside");
            aside.className = "col-preview";
            aside.innerHTML =
                `<span class="label" style="padding:0 4px;">👁 Live preview</span><div class="card" style="background:var(--soft-bg);border:none;padding:14px;" id="previewHost"></div>`;
            main.appendChild(aside);

            app.appendChild(wrap);
            renderGateInto(aside.querySelector("#previewHost"), draftConfig(), { brand: false });

            setupReveal();
            setupRippleListeners();
        }

        function renderSelectedActions(host) {
            host.innerHTML = "";
            actions.forEach(a => {
                const p = platformFor(a.platformKey);
                const row = document.createElement("div");
                row.className = "action-row";
                row.innerHTML =
                    `${p.icon(p.color, 16)}<input placeholder="${p.hint}" maxlength="2000"/><button type="button" title="Remove">${iconX("var(--muted)", 15)}</button>`;
                const input = row.querySelector("input");
                input.value = a.url;
                input.addEventListener("input", (e) => updateActionUrl(a.id, e.target.value));
                row.querySelector("button").addEventListener("click", (e) => {
                    addRipple(e, row.querySelector("button"));
                    toggleAction(a.platformKey);
                });
                host.appendChild(row);
            });
        }

        function updatePreviewTexts() {
            const t = document.querySelector("#previewHost .gate-title");
            if (t) t.textContent = title ? title : "Link is locked";
        }

        function setupReveal() {
            const els = document.querySelectorAll(".reveal-el");
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) { e.target.classList.add("in");
                        obs.unobserve(e.target); }
                });
            }, { threshold: 0.08 });
            els.forEach((el, i) => { el.style.transitionDelay = (i * 35) + "ms";
                obs.observe(el); });
        }

        function setupRippleListeners() {
            document.querySelectorAll('.btn-primary, .btn-secondary, .btn-blue-soft, .chip').forEach(btn => {
                if (!btn.dataset.rippleBound) {
                    btn.dataset.rippleBound = '1';
                    btn.addEventListener('click', function(e) { addRipple(e, this); });
                }
            });
        }

        // ==================== ROUTING ====================
        function showGateFromHash() {
            const m = location.hash.match(/g=([^&]+)/);
            if (!m) return false;
            let cfg;
            try { cfg = decodeConfig(m[1]); } catch (e) { return false; }
            app.innerHTML = "";
            const page = document.createElement("div");
            page.style.cssText =
                "min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--g-bg2, #100C1E);";
            const inner = document.createElement("div");
            inner.style.cssText = "width:100%;max-width:400px;";
            const back = document.createElement("button");
            back.className = "back-link";
            back.innerHTML = "← Back to builder";
            back.addEventListener("click", () => { location.hash = "";
                resetBuilder(); });
            inner.appendChild(back);
            const gateHost = document.createElement("div");
            inner.appendChild(gateHost);
            page.appendChild(inner);
            app.appendChild(page);
            renderGateInto(gateHost, cfg);
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return true;
        }

        // ==================== INIT ====================
        window.addEventListener("hashchange", () => { if (!showGateFromHash()) render(); });
        if (!showGateFromHash()) render();

        // Initial theme
        document.body.classList.toggle("dark", theme === "dark");

        console.log('%c🔓 Sub4Unlock %cReady %c| %cLock links behind social actions',
            'font-weight:700;font-size:16px;color:#8B5CF6;',
            'color:#22C55E;font-weight:600;',
            '',
            'color:#9C93B8;');
        console.log('%c💡 Tip: Fill in your links → Generate → Share the gate link!',
            'color:#F5A623;font-size:13px;');
    </script>
</body>
</html>
